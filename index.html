<!DOCTYPE html>
<html>
<head>
    <title>Calculadora</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #1e1e1e;
            color: white;
            text-align: center;
            margin-top: 100px;
        }

        .calculadora {
            background: #2d2d2d;
            width: 300px;
            margin: auto;
            padding: 20px;
            border-radius: 15px;
        }

        input {
            width: 90%;
            padding: 10px;
            margin: 10px 0;
            font-size: 18px;
            text-align: center;
        }

        button {
            width: 60px;
            height: 60px;
            margin: 5px;
            font-size: 20px;
            cursor: pointer;
            border: none;
            border-radius: 10px;
            background: #4CAF50;
            color: white;
        }

        button:hover {
            background: #45a049;
        }

        #resultado {
            margin-top: 15px;
            font-size: 24px;
        }
    </style>
</head>

<body>

    <div class="calculadora">
        <h1>Calculadora</h1>

        <input type="number" id="n1" placeholder="Primeiro número">
        <input type="number" id="n2" placeholder="Segundo número">

        <br>

        <button onclick="calcular('+')">+</button>
        <button onclick="calcular('-')">-</button>
        <button onclick="calcular('*')">×</button>
        <button onclick="calcular('/')">÷</button>

        <div id="resultado">Resultado: 0</div>
    </div>

    <script>
        function calcular(op) {
            let n1 = Number(document.getElementById("n1").value);
            let n2 = Number(document.getElementById("n2").value);
            let resultado;

            if (op == "+") {
                resultado = n1 + n2;
            } else if (op == "-") {
                resultado = n1 - n2;
            } else if (op == "*") {
                resultado = n1 * n2;
            } else if (op == "/") {
                resultado = n1 / n2;
            }

            document.getElementById("resultado").innerHTML =
                "Resultado: " + resultado;
        }
    </script>

</body>
</html>
